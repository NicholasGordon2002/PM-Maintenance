<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landlord Financial Entry - Rest Easy</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            border-top: 5px solid #27ae60;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #27ae60;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        input[type="text"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea {
            height: 80px;
            resize: vertical;
        }
        .btn {
            background-color: #27ae60;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 10px;
        }
        .btn:hover {
            background-color: #219150;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            text-align: center;
            color: #7f8c8d;
        }
        .note {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 15px;
            padding: 10px;
            background-color: #e8f5e9;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Financial Entry</h1>
        <div class="note">
            Use this form to record income (rent) and expenses. 
            <strong>Positive</strong> amounts for income, <strong>negative</strong> for expenses.
        </div>
        <form action="https://script.google.com/macros/s/AKfycbxmUiHflsBHQ110HRgHWDh0cNeaf5T5CxQCQ8qRkJvffR1IxNMYbyCLjIRZFwS-Z5Y/exec" method="POST">
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="form-group">
                <label for="type">Transaction Type</label>
                <select name="type" id="type" required>
                    <option value="Rent Payment">Rent Payment</option>
                    <option value="Expense">Expense</option>
                    <option value="Deposit">Deposit</option>
                    <option value="Refund">Refund</option>
                </select>
            </div>

            <div class="form-group">
                <label for="unitNumber">Unit Number</label>
                <select name="unitNumber" id="unitNumber" required>
                    <option value="All">Building (All Units)</option>
                    <option value="Unit 1">Unit 1</option>
                    <option value="Unit 2">Unit 2</option>
                    <option value="Unit 3">Unit 3</option>
                    <option value="Unit 4">Unit 4</option>
                </select>
            </div>

            <div class="form-group">
                <label for="amount">Amount ($)</label>
                <input type="number" id="amount" name="amount" step="0.01" required placeholder="0.00">
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <input type="text" id="description" name="description" required placeholder="e.g. October Rent or Plumbing Repair">
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <select name="category" id="category" required>
                    <option value="Rent">Rent</option>
                    <option value="Maintenance">Maintenance</option>
                    <option value="Utilities">Utilities</option>
                    <option value="Insurance">Insurance</option>
                    <option value="Taxes">Taxes</option>
                    <option value="Management Fee">Management Fee</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="notes">Notes</label>
                <textarea id="notes" name="notes" placeholder="Any additional details..."></textarea>
            </div>

            <button type="submit" class="btn">Record Transaction</button>
        </form>
        <div class="footer">
            Rest Easy Property Management — Landlord Portal
        </div>
    </div>
    <script>
        // Set default date to today
        document.getElementById('date').valueAsDate = new Date();
    </script>
</body>
</html>
