<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenant Maintenance Request - Rest Easy</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #2c3e50;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
        }
        textarea {
            height: 100px;
            resize: vertical;
        }
        .urgency-emergency { color: #d9534f; font-weight: bold; }
        .btn {
            background-color: #3498db;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 10px;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            text-align: center;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Maintenance Request</h1>
        <form action="https://script.google.com/macros/s/AKfycbwK9naHaE57H8Cs8DG7rLh4GvPbF5NW3UvPutwoWNM8ssA2XDJ-1jH2FVIY5TfvuE3Kxg/exec" method="POST">
            <div class="form-group">
                <label for="unitNumber">Unit Number</label>
                <select name="unitNumber" id="unitNumber" required>
                    <option value="">Select Unit...</option>
                    <option value="Unit 1">Unit 1</option>
                    <option value="Unit 2">Unit 2</option>
                    <option value="Unit 3">Unit 3</option>
                    <option value="Unit 4">Unit 4</option>
                    <!-- Landlord: Add more units here as needed -->
                </select>
            </div>
            
            <div class="form-group">
                <label for="tenantName">Your Name</label>
                <input type="text" id="tenantName" name="tenantName" required placeholder="Full Name">
            </div>

            <div class="form-group">
                <label for="tenantEmail">Your Email</label>
                <input type="email" id="tenantEmail" name="tenantEmail" required placeholder="email@example.com">
            </div>

            <div class="form-group">
                <label for="tenantPhone">Your Phone (Optional)</label>
                <input type="tel" id="tenantPhone" name="tenantPhone" placeholder="555-0123">
            </div>

            <div class="form-group">
                <label for="category">Issue Category</label>
                <select name="category" id="category" required>
                    <option value="">Select Category...</option>
                    <option value="Plumbing">Plumbing</option>
                    <option value="Electrical">Electrical</option>
                    <option value="HVAC">HVAC</option>
                    <option value="Appliance">Appliance</option>
                    <option value="Structural">Structural</option>
                    <option value="Pest">Pest</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="description">Description of Issue</label>
                <textarea id="description" name="description" maxlength="500" required placeholder="Please describe the issue in detail..."></textarea>
            </div>

            <div class="form-group">
                <label for="contactMethod">Preferred Contact Method</label>
                <select name="contactMethod" id="contactMethod" required>
                    <option value="Email">Email</option>
                    <option value="Phone">Phone</option>
                    <option value="Either">Either</option>
                </select>
            </div>

            <div class="form-group">
                <label for="urgency">Urgency</label>
                <select name="urgency" id="urgency" required>
                    <option value="Low">Low (Routine)</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>
                    <option value="Emergency">Emergency (Immediate danger/damage)</option>
                </select>
            </div>

            <button type="submit" class="btn">Submit Request</button>
        </form>
        <div class="footer">
            Powered by Rest Easy Property Management
        </div>
    </div>
</body>
</html>
